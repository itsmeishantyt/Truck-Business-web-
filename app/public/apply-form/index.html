<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now — N&Z Logistics LLC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Prevent scroll during animation */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Top Progress Bar */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #progress-bar {
            height: 100%;
            background: #f97316;
            /* orange-500 */
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        /* Nav controls */
        #controls-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Hint text */
        .key-hint {
            font-size: 0.75rem;
            color: #6b7280;
            /* gray-500 */
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .key-hint kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: inherit;
        }

        /* Helper for absolute positioning during transition */
        .step-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body class="bg-black text-white antialiased">

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <!-- Container for dynamic questions -->
    <main id="app" class="relative max-w-3xl mx-auto px-6 w-full h-full flex items-center justify-center">
        <!-- Questions injected here -->
    </main>

    <div id="controls-container">
        <button id="btn-up" class="nav-btn" aria-label="Previous question" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 15l-6-6-6 6" />
            </svg>
        </button>
        <button id="btn-down" class="nav-btn" aria-label="Next question">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9l6 6 6-6" />
            </svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>

</html>
